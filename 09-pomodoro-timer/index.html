<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro — Focus Timer</title>
  <meta name="description" content="A calm, focus-oriented Pomodoro timer with task tracking and daily stats." />
  <link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23e11d48'/%3E%3C/svg%3E" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap&subset=cyrillic,latin" rel="stylesheet" />

  <script>
    // Tailwind dark-mode uses "class" strategy so we can toggle it dynamically
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans transition-colors duration-500">

  <!-- App shell -->
  <div class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8 py-6 sm:py-10">

    <!-- Header -->
    <header class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <!-- Logo: tomato icon -->
        <svg class="w-8 h-8 text-rose-500" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
          <path d="M16 6c-1.1-2-3-3-5-3 0 2 1 3 3 4-3 1-6 4-6 9 0 6 4 11 8 11s8-5 8-11c0-5-3-8-6-9 2-1 3-2 3-4-2 0-3.9 1-5 3z"/>
        </svg>
        <h1 class="text-xl font-semibold tracking-tight">Pomodoro</h1>
      </div>
      <button id="settings-btn"
              class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors active:scale-95"
              aria-label="Open settings">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Main grid -->
    <main class="grid grid-cols-1 lg:grid-cols-5 gap-6 lg:gap-8">

      <!-- Timer panel -->
      <section class="lg:col-span-3">
        <div id="timer-card"
             class="rounded-2xl p-6 sm:p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm transition-colors duration-500">

          <!-- Mode tabs -->
          <div class="flex justify-center gap-1 sm:gap-2 mb-6">
            <button data-mode="focus"
                    class="mode-tab active px-3 sm:px-4 py-2 rounded-lg text-sm font-medium transition-all">
              Focus
            </button>
            <button data-mode="short"
                    class="mode-tab px-3 sm:px-4 py-2 rounded-lg text-sm font-medium transition-all">
              Short Break
            </button>
            <button data-mode="long"
                    class="mode-tab px-3 sm:px-4 py-2 rounded-lg text-sm font-medium transition-all">
              Long Break
            </button>
          </div>

          <!-- Active task banner -->
          <div id="active-task-banner" class="text-center mb-4 min-h-[1.5rem] text-sm text-slate-500 dark:text-slate-400">
            <span class="opacity-60">No task selected</span>
          </div>

          <!-- Timer + ring -->
          <div class="relative mx-auto w-[280px] h-[280px] sm:w-[340px] sm:h-[340px]">
            <svg class="w-full h-full -rotate-90" viewBox="0 0 200 200" aria-hidden="true">
              <circle cx="100" cy="100" r="92" fill="none"
                      class="stroke-slate-200 dark:stroke-slate-800"
                      stroke-width="8" />
              <circle id="progress-ring"
                      cx="100" cy="100" r="92" fill="none"
                      stroke-width="8"
                      stroke-linecap="round"
                      class="transition-[stroke] duration-500"
                      style="stroke-dasharray: 578.05; stroke-dashoffset: 0;"
                      pathLength="1"
                      />
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center select-none">
              <div id="time-display"
                   class="text-6xl sm:text-7xl md:text-8xl font-bold tabular-nums tracking-tight"
                   aria-live="polite" aria-atomic="true">25:00</div>
              <div id="mode-label" class="mt-2 text-sm font-medium uppercase tracking-widest text-slate-500 dark:text-slate-400">Focus</div>
            </div>
          </div>

          <!-- Controls -->
          <div class="flex items-center justify-center gap-4 mt-8">
            <button id="reset-btn"
                    class="p-3 rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all active:scale-90"
                    aria-label="Reset timer">
              <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 9-9"/>
                <path d="M3 4v5h5"/>
              </svg>
            </button>

            <button id="play-pause-btn"
                    class="primary-btn group flex items-center justify-center w-20 h-20 rounded-full shadow-lg text-white font-bold transition-all active:scale-95"
                    aria-label="Start timer">
              <svg id="play-icon" class="w-8 h-8 ml-1" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M8 5v14l11-7z"/>
              </svg>
              <svg id="pause-icon" class="w-8 h-8 hidden" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
              </svg>
            </button>

            <button id="skip-btn"
                    class="p-3 rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all active:scale-90"
                    aria-label="Skip to next session">
              <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polygon points="5 4 15 12 5 20 5 4"/>
                <line x1="19" y1="5" x2="19" y2="19"/>
              </svg>
            </button>
          </div>

          <!-- Session counter -->
          <div class="flex items-center justify-center gap-2 mt-6 text-xs text-slate-500 dark:text-slate-400">
            <span id="session-counter">Session 1 of 4</span>
          </div>
        </div>
      </section>

      <!-- Tasks panel -->
      <aside class="lg:col-span-2">
        <div class="rounded-2xl p-5 sm:p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold">Tasks</h2>
            <button id="clear-completed-btn"
                    class="text-xs text-slate-500 hover:text-rose-500 dark:text-slate-400 dark:hover:text-rose-400 transition-colors"
                    title="Clear completed tasks">
              Clear completed
            </button>
          </div>

          <!-- Add task form -->
          <form id="task-form" class="flex gap-2 mb-4">
            <input id="task-input" type="text"
                   placeholder="What are you working on?"
                   autocomplete="off"
                   maxlength="120"
                   class="flex-1 px-3 py-2 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400/50 transition-all" />
            <button type="submit"
                    class="px-3 py-2 rounded-lg bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 text-sm font-medium hover:opacity-90 transition-all active:scale-95"
                    aria-label="Add task">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </form>

          <!-- Task list -->
          <ul id="task-list" class="space-y-2 max-h-[340px] overflow-y-auto pr-1">
            <!-- rendered dynamically -->
          </ul>
          <div id="tasks-empty" class="hidden text-center py-8 text-sm text-slate-400 dark:text-slate-500">
            No tasks yet. Add one above.
          </div>
        </div>

        <!-- Stats card -->
        <div class="mt-6 rounded-2xl p-5 sm:p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm">
          <h2 class="text-lg font-semibold mb-4">Today's stats</h2>
          <div class="grid grid-cols-3 gap-3">
            <div class="text-center p-3 rounded-xl bg-slate-50 dark:bg-slate-800">
              <div id="stat-minutes" class="text-2xl font-bold tabular-nums">0</div>
              <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">Minutes</div>
            </div>
            <div class="text-center p-3 rounded-xl bg-slate-50 dark:bg-slate-800">
              <div id="stat-pomodoros" class="text-2xl font-bold tabular-nums">0</div>
              <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">Pomodoros</div>
            </div>
            <div class="text-center p-3 rounded-xl bg-slate-50 dark:bg-slate-800">
              <div id="stat-tasks" class="text-2xl font-bold tabular-nums">0</div>
              <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">Tasks done</div>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <footer class="mt-10 text-center text-xs text-slate-400 dark:text-slate-500">
      Built with plain HTML, CSS &amp; vanilla JS. Your data stays in your browser.
    </footer>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal"
       class="fixed inset-0 z-50 hidden items-center justify-center p-4"
       role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div id="settings-backdrop" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-md rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 shadow-xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-6">
        <h2 id="settings-title" class="text-lg font-semibold">Settings</h2>
        <button id="close-settings-btn"
                class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                aria-label="Close settings">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="space-y-5">
        <!-- Durations -->
        <div>
          <h3 class="text-xs font-semibold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-3">Timer durations (minutes)</h3>
          <div class="grid grid-cols-3 gap-3">
            <label class="block">
              <span class="text-xs text-slate-500 dark:text-slate-400">Focus</span>
              <input id="setting-focus" type="number" min="1" max="60"
                     class="mt-1 w-full px-2 py-2 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm tabular-nums focus:outline-none focus:ring-2 focus:ring-rose-400/50" />
            </label>
            <label class="block">
              <span class="text-xs text-slate-500 dark:text-slate-400">Short break</span>
              <input id="setting-short" type="number" min="1" max="30"
                     class="mt-1 w-full px-2 py-2 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm tabular-nums focus:outline-none focus:ring-2 focus:ring-rose-400/50" />
            </label>
            <label class="block">
              <span class="text-xs text-slate-500 dark:text-slate-400">Long break</span>
              <input id="setting-long" type="number" min="1" max="60"
                     class="mt-1 w-full px-2 py-2 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm tabular-nums focus:outline-none focus:ring-2 focus:ring-rose-400/50" />
            </label>
          </div>
        </div>

        <!-- Toggles -->
        <div class="space-y-3">
          <label class="flex items-center justify-between py-1 cursor-pointer">
            <span class="text-sm">Auto-advance sessions</span>
            <input id="setting-auto" type="checkbox" class="toggle" />
          </label>
          <label class="flex items-center justify-between py-1 cursor-pointer">
            <span class="text-sm">Sound notifications</span>
            <input id="setting-sound" type="checkbox" class="toggle" />
          </label>
          <label class="flex items-center justify-between py-1 cursor-pointer">
            <span class="text-sm">Browser notifications</span>
            <input id="setting-notify" type="checkbox" class="toggle" />
          </label>
          <label class="flex items-center justify-between py-1 cursor-pointer">
            <span class="text-sm">Dark mode</span>
            <input id="setting-dark" type="checkbox" class="toggle" />
          </label>
        </div>

        <!-- Danger zone -->
        <div class="pt-3 border-t border-slate-200 dark:border-slate-800">
          <button id="reset-data-btn"
                  class="w-full py-2 rounded-lg text-sm font-medium text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/40 transition-colors">
            Reset all data
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
